name: Sync x-tunnel Multi-Arch to Docker Hub

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Inspect source image
        run: docker buildx imagetools inspect docker.io/jonnyan404/x-tunnel:20260326

      - name: Copy multi-arch image to Docker Hub
        run: |
          docker buildx imagetools create \
            --tag docker.io/${{ secrets.DOCKERHUB_USERNAME }}/x-tunnel:20260326 \
            --tag docker.io/${{ secrets.DOCKERHUB_USERNAME }}/x-tunnel:latest \
            docker.io/jonnyan404/x-tunnel:20260326

      - name: Inspect target image
        run: docker buildx imagetools inspect docker.io/${{ secrets.DOCKERHUB_USERNAME }}/x-tunnel:20260326
